name: feedback_collector
description: "A Flutter User Feedback Collection Application"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.10.8 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.0
  google_sign_in: ^6.2.2
  # State Management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7
  # Local Database
  sqflite: ^2.4.2
  path: ^1.9.1
  # Dependency Injection
  get_it: ^8.0.3
  # Media & Storage
  image_picker: ^1.1.2
  permission_handler: ^11.4.0
  path_provider: ^2.1.5
  # CSV Export
  csv: ^6.0.0
  # Biometric Auth
  local_auth: ^2.3.0
  # Utils
  uuid: ^4.5.1
  intl: ^0.20.2
  device_info_plus: ^11.4.0

dependency_overrides:
  objective_c: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true